services:
  - type: web
    name: bagels-backend
    runtime: node
    rootDir: bagels-web-app/backend
    plan: starter
    buildCommand: npm install && npm run prisma:generate
    preDeployCommand: npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: bagels-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_PROFILE_FOLDER
        value: bagels/profiles
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_ACCOUNT_NAME
        value: CASH CLAIR
      - key: RAZORPAY_THEME_COLOR
        value: "#10b981"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: bagels-frontend
    runtime: static
    rootDir: bagels-web-app/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SERVER_URL
        sync: false

databases:
  - name: bagels-postgres
    plan: free
    databaseName: bagels
    user: bagels
